version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      timezone: UTC
      time: "07:00"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      timezone: UTC
      time: "07:00"
    open-pull-requests-limit: 50
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      format:
        patterns:
          - "@bufbuild/license-header"
          - "prettier"
          - "esbuild"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@react-hookz/web"
      demo:
        patterns:
          - "@buf/connectrpc*"
          - "@bufbuild/protobuf"
          - "@connectrpc/*"
